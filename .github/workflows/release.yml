name: release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump version
        id: ver
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(npm version patch --no-git-tag-version | tr -d 'v')
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          git add package.json
          git commit -m "chore: release v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin main --tags

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git build-essential python3 python3-dev \
            libusb-1.0-0-dev libudev-dev pkg-config \
            libusb-1.0-0 libudev1 ca-certificates
          docker run --privileged --rm tonistiigi/binfmt --install arm64 >/dev/null

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build arm64 AppImage (emulated)
        run: |
          mkdir -p .pnpm-store .cache/electron .cache/electron-builder
          chmod -R a+rwx .pnpm-store .cache || true

          docker run --rm --platform=linux/arm64/v8 \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            -e HUSKY=0 \
            -e PNPM_NODE_LINKER=hoisted \
            -e PNPM_SHAMEFULLY_HOIST=true \
            -e ELECTRON_CACHE=/work/.cache/electron \
            -e ELECTRON_BUILDER_CACHE=/work/.cache/electron-builder \
            node:24-trixie-slim bash -lc '
              set -euo pipefail
              apt-get update
              apt-get install -y --no-install-recommends \
                git build-essential python3 python3-dev \
                libusb-1.0-0-dev libudev-dev pkg-config \
                libusb-1.0-0 libudev1 ca-certificates liblzo2-2
              rm -rf /var/lib/apt/lists/*
              corepack enable && corepack install
              pnpm config set store-dir /work/.pnpm-store
              pnpm install --frozen-lockfile
              ELECTRON_VERSION="$(node -p "require(\"./node_modules/electron/package.json\").version")"
              npx --yes node-gyp install --target="$ELECTRON_VERSION" --dist-url=https://artifacts.electronjs.org/headers/dist
              pnpm run build:armLinux
            '

      - name: Fix permissions
        run: sudo chown -R "$USER:$USER" dist .cache .pnpm-store 2>/dev/null || true

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(TZ=Europe/Berlin date +'%Y-%m-%d')
          VERSION="${{ steps.ver.outputs.version }}"
          gh release create "v${VERSION}" dist/*.AppImage \
            --title "v${VERSION} (${DATE})" \
            --notes "## Release Notes – v${VERSION}" \
            --repo "${{ github.repository }}"
